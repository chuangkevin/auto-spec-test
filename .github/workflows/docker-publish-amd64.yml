name: Build and Push Docker Image AMD64

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'docker-entrypoint.sh'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker-publish-amd64.yml'
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/auto-spec-test:amd64-latest
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          provenance: false

      - name: Summary
        run: |
          echo "## Docker Image Published (AMD64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.DOCKERHUB_USERNAME }}/auto-spec-test:amd64-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
